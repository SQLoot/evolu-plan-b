name: Web Build

# Disabled per user request
on:
  pull_request:
    branches: ["*"]
    paths:
      - "apps/web/**"
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3

jobs:
  build:
    if: false  # <--- Disabled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Web
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
        run: bun run build && bun run build:web
